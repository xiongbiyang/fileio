name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate i18n
        run: python3 scripts/check_i18n.py

      - name: Unit tests
        run: npx vitest --exclude e2e/** --run

      - name: Typecheck
        run: npm exec nuxi typecheck

      - name: Build
        run: npm run build
