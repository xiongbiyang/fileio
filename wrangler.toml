name = "transfer"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat_v2"]
pages_build_output_dir = "dist"

# ── Quick Share (temporary file sharing) ─────────────────────────────────────
# R2 bucket: stores uploaded files (purged on download / after 3 days)
# Create:  npx wrangler r2 bucket create fileio-share
# Lifecycle: npx wrangler r2 bucket lifecycle add fileio-share --prefix "" --expire-days 3
# [[r2_buckets]]
# binding = "SHARE_BUCKET"
# bucket_name = "fileio-share"

# KV namespace: rate-limit counters for upload / download per IP
# Create:  npx wrangler kv:namespace create RATE_LIMIT_KV
# Then paste the id below and uncomment:
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "paste-your-kv-id-here"

# ── Optional: D1 database (not used currently, reserved for future) ──────────
# [[d1_databases]]
# binding = "DB"
# database_name = "fileio-db"
# database_id = "paste-your-id-here"

# Environment variables (public only — NUXT_TURNSTILE_SECRET_KEY is a Pages encrypted secret)
[vars]
NUXT_PUBLIC_SITE_URL = "https://fileio.top"
NUXT_PUBLIC_PARTYKIT_HOST = "placeholder.partykit.dev"
NUXT_PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAAC92lcIhvgLdN6RF"
NUXT_PUBLIC_ADS_ENABLED = "false"
