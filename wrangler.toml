name = "transfer"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat_v2"]
pages_build_output_dir = "dist"

# ── Quick Share (temporary file sharing) ─────────────────────────────────────
# R2 bucket: stores uploaded files (purged on download / after 3 days)
[[r2_buckets]]
binding = "SHARE_BUCKET"
bucket_name = "fileio-share"

# KV namespace: rate-limit counters for upload / download per IP
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "b97174555adb43de94b68cd627b6cd6b"

# ── Optional: D1 database (not used currently, reserved for future) ──────────
# [[d1_databases]]
# binding = "DB"
# database_name = "fileio-db"
# database_id = "paste-your-id-here"

# Environment variables.
#
# Public (committed here):
#   NUXT_PUBLIC_*
#
# Server-only secrets (set via Cloudflare Pages Dashboard → Settings →
# Environment variables, NEVER here):
#   NUXT_TURNSTILE_SECRET_KEY        — Turnstile verify secret
#   NUXT_CLOUDFLARE_TURN_KEY_ID      — R2 TURN/STUN credential key id
#   NUXT_CLOUDFLARE_TURN_API_TOKEN   — R2 TURN/STUN credential API token
#   NUXT_R2_ACCOUNT_ID               — Cloudflare account id (R2 overview page)
#   NUXT_R2_ACCESS_KEY_ID            — R2 S3 API token access key id
#   NUXT_R2_SECRET_ACCESS_KEY        — R2 S3 API token secret (ENCRYPTED)
# R2 S3 credentials are used by /api/share/presign.post.ts to mint presigned
# PUT URLs so the browser can stream uploads (up to 1 GB) directly to R2,
# bypassing the Worker's 100 MB request-body cap.
[vars]
NUXT_PUBLIC_SITE_URL = "https://fileio.top"
NUXT_PUBLIC_PARTYKIT_HOST = "transfer.xiongbiyang.partykit.dev"
NUXT_PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAAC92lcIhvgLdN6RF"
NUXT_PUBLIC_ADS_ENABLED = "false"
